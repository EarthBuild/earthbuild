name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/renovate.json5'
      - '.github/CODEOWNERS'
      - 'LICENSE'
  pull_request:
    branches: [ main, get-ci-working ]
  merge_group:


permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${{ vars.OTEL_EXPORTER_OTLP_PROTOCOL }}
  OTEL_RESOURCE_ATTRIBUTES: ${{ vars.OTEL_RESOURCE_ATTRIBUTES != '' && format('{0},', vars.OTEL_RESOURCE_ATTRIBUTES) || '' }}${{ github.event.pull_request != null && format('vcs.repository.change.id={0},vcs.repository.change.title={1},', github.event.pull_request.number, github.event.pull_request.title) || '' }}cicd.pipeline.run.id=${{ github.run_number }},cicd.pipeline.run.url.full=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }},cicd.pipeline.name=${{ github.workflow }},vcs.revision.id=${{ github.sha }},vcs.ref.name=${{ github.ref_name }},vcs.repository.name=${{ github.repository }},user.id=${{ github.actor }}
  OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

jobs:
  fast-check-and-build:
    name: Fast Check & Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      EARTHLY_INSTALL_ID: "earthly-githubactions"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EARTHLY_BUILDKIT_IMAGE: ghcr.io/earthbuild/earthbuild:buildkitd-v0.8.17-fix.1
    steps:
      - uses: earthbuild/actions-setup@5d323543fa1d7b963384b46b2cbaef0bf6d88216 # v2.1.0
        with:
          # Authenticate the release-list API call so it isn't rate-limited on
          # shared runner IPs (unauthenticated is 60 req/hr/IP).
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Lint
        run: earth --ci +lint-all
      - name: Unit tests
        run: earth --ci +unit-test
      - name: Fuzz tests
        run: earth --ci +fuzz-test

      # --- Build Standard EarthBuild ---
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: "Put back the git branch into git (EarthBuild uses it for tagging)"
        run: |
          branch=""
          if [ -n "$GITHUB_HEAD_REF" ]; then
            branch="$GITHUB_HEAD_REF"
          else
            branch="${GITHUB_REF##*/}"
          fi
          git checkout -b "$branch" || true
      - name: Configure EarthBuild to use GCR mirror
        run: |-
          earth config global.buildkit_additional_config "'[registry.\"docker.io\"]
          mirrors = [\"mirror.gcr.io\", \"public.ecr.aws\"]'"
      - name: Build latest earth using released earth
        run: earth --use-inline-cache +for-linux
      - name: Set EARTHLY_VERSION_FLAG_OVERRIDES env
        run: |-
          set -euo pipefail
          EARTHLY_VERSION_FLAG_OVERRIDES="$(tr -d '\n' < .earthly_version_flag_overrides)"
          echo "EARTHLY_VERSION_FLAG_OVERRIDES=$EARTHLY_VERSION_FLAG_OVERRIDES" >> "$GITHUB_ENV"
      - name: Build and push +ci-release using latest earthly build
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |-
          export TAG_SUFFIX="ubuntu-latest"
          ./build/linux/amd64/earthly --ci --push --build-arg TAG_SUFFIX +ci-release
      - name: Build +ci-release using latest earthly build (fork - no push)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |-
          export TAG_SUFFIX="ubuntu-latest"
          # Build ci-release (builds binary and buildkitd but doesn't push)
          ./build/linux/amd64/earthly --ci --output --build-arg TAG_SUFFIX +ci-release
          # Explicitly output the buildkitd image to local docker daemon
          ./build/linux/amd64/earthly --ci --image --build-arg TAG="${GITHUB_SHA}-${TAG_SUFFIX}" --build-arg DOCKERHUB_BUILDKIT_IMG=buildkitd-staging ./buildkitd+buildkitd
      - name: Save artifacts for fork CI
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |-
          set -euo pipefail
          export TAG_SUFFIX="ubuntu-latest"

          mkdir -p ./artifacts-standard

          # Build earthly CLI binary with correct installation name (earthly, not earthly-dev)
          # This ensures the buildkitd container is named "earthly-buildkitd" as tests expect
          ./build/linux/amd64/earthly --ci --artifact \
            +earthly/earthly \
            --DEFAULT_BUILDKITD_IMAGE="ghcr.io/earthbuild/earthbuild:buildkitd-staging-${GITHUB_SHA}-${TAG_SUFFIX}" \
            --VERSION="0.8.18" \
            --DEFAULT_INSTALLATION_NAME=earthly \
            ./artifacts-standard/earthly

          # Save the buildkitd image as tarball
          docker save \
            "ghcr.io/earthbuild/earthbuild:buildkitd-staging-${GITHUB_SHA}-${TAG_SUFFIX}" \
            -o ./artifacts-standard/buildkitd-image.tar

          # Save the tag suffix for downstream jobs
          echo "${TAG_SUFFIX}" > ./artifacts-standard/tag-suffix.txt
      - name: Upload artifacts for fork CI
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: earthly-build-ubuntu-latest
          path: ./artifacts-standard/
          retention-days: 1

      # --- Build Next EarthBuild ---
      - name: Update Buildkit to earthly-next
        run: earth +update-buildkit --BUILDKIT_GIT_SHA="$(cat earthly-next)"
      - name: Build latest earthly (next) using released earthly
        run: earth --use-inline-cache +for-linux
      - name: Build and push +ci-release (next) using latest earth build
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |-
          export TAG_SUFFIX="ubuntu-latest-ticktock"
          ./build/linux/amd64/earthly --ci --push --build-arg TAG_SUFFIX +ci-release
      - name: Build +ci-release (next) using latest earth build (fork - no push)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |-
          export TAG_SUFFIX="ubuntu-latest-ticktock"
          # Build ci-release (builds binary and buildkitd but doesn't push)
          ./build/linux/amd64/earthly --ci --output --build-arg TAG_SUFFIX +ci-release
          # Explicitly output the buildkitd image to local docker daemon
          ./build/linux/amd64/earthly --ci --image --build-arg TAG="${GITHUB_SHA}-${TAG_SUFFIX}" --build-arg DOCKERHUB_BUILDKIT_IMG=buildkitd-staging ./buildkitd+buildkitd
      - name: Save artifacts (next) for fork CI
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |-
          set -euo pipefail
          export TAG_SUFFIX="ubuntu-latest-ticktock"

          mkdir -p ./artifacts-next

          # Build earthly CLI binary with correct installation name (earthly, not earthly-dev)
          # This ensures the buildkitd container is named "earthly-buildkitd" as tests expect
          ./build/linux/amd64/earthly --ci --artifact \
            +earthly/earthly \
            --DEFAULT_BUILDKITD_IMAGE="ghcr.io/earthbuild/earthbuild:buildkitd-staging-${GITHUB_SHA}-${TAG_SUFFIX}" \
            --VERSION="0.8.18" \
            --DEFAULT_INSTALLATION_NAME=earthly \
            ./artifacts-next/earthly

          # Save the buildkitd image as tarball
          docker save \
            "ghcr.io/earthbuild/earthbuild:buildkitd-staging-${GITHUB_SHA}-${TAG_SUFFIX}" \
            -o ./artifacts-next/buildkitd-image.tar

          # Save the tag suffix for downstream jobs
          echo "${TAG_SUFFIX}" > ./artifacts-next/tag-suffix.txt
      - name: Upload artifacts (next) for fork CI
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: earthly-build-ubuntu-latest-ticktock
          path: ./artifacts-next/
          retention-days: 1

  docker:
    name: Docker
    needs: fast-check-and-build
    uses: ./.github/workflows/ci-docker-ubuntu.yml
    secrets: inherit

  podman:
    name: Podman
    needs: fast-check-and-build
    uses: ./.github/workflows/ci-podman-ubuntu.yml
    secrets: inherit

  next:
    name: Next
    needs: fast-check-and-build
    uses: ./.github/workflows/ci-earthly-next-docker-ubuntu.yml
    secrets: inherit
