name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/renovate.json5'
      - '.github/CODEOWNERS'
      - 'LICENSE'
  pull_request:
    branches: [ main, get-ci-working ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-check:
    name: Fast Check
    uses: ./.github/workflows/ci-fast-check.yml
    secrets: inherit

  docker:
    name: Docker
    needs: fast-check
    uses: ./.github/workflows/ci-docker-ubuntu.yml
    secrets: inherit

  podman:
    name: Podman
    needs: fast-check
    uses: ./.github/workflows/ci-podman-ubuntu.yml
    secrets: inherit

  next:
    name: Next
    needs: fast-check
    uses: ./.github/workflows/ci-earthly-next-docker-ubuntu.yml
    secrets: inherit
