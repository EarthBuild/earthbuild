  # Experimental: run the worst no-qemu flaky targets natively on both x86 and
  # ARM. Needs build-earthly so the PR's staging buildkit image exists for
  # the x86 matrix entry (the Earthfile +ci-release target only builds
  # linux/amd64, so ARM falls back to the multi-arch fix.5 image).
  # continue-on-error keeps the matrix non-blocking.
  docker-native-tests:
    name: ${{ matrix.target }} native (${{ matrix.runs_on }})
    needs: build-earthly
    if: ${{ !failure() }}
    runs-on: ${{ matrix.runs_on }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        runs_on: [ubuntu-latest, ubuntu-24.04-arm]
        target: ['+test-misc']
        # Tried expanding to +test-no-qemu-group5 and +test-no-qemu-slow but
        # both were flaky on native x86 too (slow: pre-existing nested-WITH-DOCKER
        # failure "could not determine buildkit address" inside ./tests+server).
        # Only +test-misc has been consistent across runs so keep the matrix
        # narrow while we gather more signal. Three concurrent ARM entries also
        # all failed earlier at ~6min (earthly "Canceled"); single-target ARM
        # has been reliable.
    env:
      FORCE_COLOR: 1
      EARTHLY_INSTALL_ID: "earthly-githubactions"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # x86 matrix entry uses the PR's own staging buildkit (same as the main
      # pipeline does after stage2-setup was updated). ARM falls back to the
      # multi-arch fix.5 image because +ci-release doesn't build linux/arm64.
      EARTHLY_BUILDKIT_IMAGE: ${{ contains(matrix.runs_on, 'arm') && 'ghcr.io/earthbuild/earthbuild:buildkitd-v0.8.17-fix.5' || format('ghcr.io/earthbuild/earthbuild:buildkitd-staging-{0}-ubuntu-latest-docker', github.sha) }}
    steps:
      - uses: earthbuild/actions-setup@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Runner / tooling versions
        run: |
          uname -a
          docker version
          earth --version
      - name: Earthly bootstrap
        run: earth bootstrap
      - name: Configure GCR mirror
        run: |
          earth config global.buildkit_additional_config "'[registry.\"docker.io\"]
          mirrors = [\"mirror.gcr.io\", \"public.ecr.aws\"]'"
      - name: Limit buildkit parallelism to avoid OOM
        run: earth config global.buildkit_max_parallelism 2
      - name: Run ${{ matrix.target }} natively on ${{ matrix.runs_on }}
        run: |-
          set +e
          attempt=1
          max_attempts=2
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::attempt $attempt of $max_attempts"
            earth --ci -P ${{ matrix.target }}
            rc=$?
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then exit 0; fi
            if [ "$attempt" -eq "$max_attempts" ]; then exit "$rc"; fi
            echo "Attempt $attempt exited $rc; resetting buildkitd and retrying once."
            docker rm -f earthly-buildkitd 2>/dev/null || true
            attempt=$((attempt + 1))
          done
      - name: Buildkit logs (on failure)
        if: ${{ failure() }}
        run: docker logs earthly-buildkitd || true
