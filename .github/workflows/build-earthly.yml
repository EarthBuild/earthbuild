name: Earthly Build

on:
  workflow_call:
    inputs:
      BUILT_EARTHLY_PATH:
        required: true
        type: string
      BINARY:
        required: true
        type: string
      SUDO:
        type: string
        required: false
      RUNS_ON:
        required: true
        type: string
      SKIP_JOB:
        required: false
        type: boolean
        default: false
      USE_NEXT:
        required: false
        type: boolean
        default: false

permissions: {}

env:
  OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${{ vars.OTEL_EXPORTER_OTLP_PROTOCOL }}
  OTEL_RESOURCE_ATTRIBUTES: ${{ vars.OTEL_RESOURCE_ATTRIBUTES != '' && format('{0},', vars.OTEL_RESOURCE_ATTRIBUTES) || '' }}${{ github.event.pull_request != null && format('vcs.repository.change.id={0},vcs.repository.change.title={1},', github.event.pull_request.number, github.event.pull_request.title) || '' }}cicd.pipeline.run.id=${{ github.run_number }},cicd.pipeline.run.url.full=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }},cicd.pipeline.name=${{ github.workflow }},vcs.revision.id=${{ github.sha }},vcs.ref.name=${{ github.ref_name }},vcs.repository.name=${{ github.repository }},user.id=${{ github.actor }}
  OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

jobs:

  build-earthly:
    name: build (and push) earthly using ${{inputs.BINARY}} and earthly-next=${{inputs.USE_NEXT}}
    if: ${{!inputs.SKIP_JOB}}
    runs-on: ${{inputs.RUNS_ON}}
    # Needed for the +ci-release target to push to the GitHub Container Registry for later builds
    permissions: write-all
    env:
      FORCE_COLOR: 1
      EARTHLY_INSTALL_ID: "earthly-githubactions"
      # Used in our github action as the token - TODO: look to change it into an input
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Use fixed buildkitd image with Docker 29+ ulimit fix and grpc-go ALPN support
      EARTHLY_BUILDKIT_IMAGE: ghcr.io/earthbuild/earthbuild:buildkitd-v0.8.17-fix.5
    steps:
      - uses: earthbuild/actions-setup@main
        with:
          version: v0.8.17
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "Put back the git branch into git (Earthly uses it for tagging)"
        run: |
          branch=""
          if [ -n "$GITHUB_HEAD_REF" ]; then
            branch="$GITHUB_HEAD_REF"
          else
            branch="${GITHUB_REF##*/}"
          fi
          git checkout -b "$branch" || true
      - name: remove Docker
        run: ${{inputs.SUDO}} apt-get purge docker-engine docker docker.io docker-ce docker-ce-cli ; ${{inputs.SUDO}} rm -rf /usr/bin/docker
        if: inputs.BINARY != 'docker'
      - name: Install Podman (with apt-get)
        run: ${{inputs.SUDO}} apt-get update && ${{inputs.SUDO}} apt-get install -y podman && ${{inputs.SUDO}} rm -f /etc/containers/registries.conf
        if: inputs.BINARY == 'podman'
      - name: Podman debug info
        run: podman version && podman info && podman info --debug
        if: inputs.BINARY == 'podman'
      - name: Add swap for extra memory headroom
        run: |
          sudo fallocate -l 12G /extra-swapfile
          sudo chmod 600 /extra-swapfile
          sudo mkswap /extra-swapfile
          sudo swapon /extra-swapfile
          echo "Swap added: $(swapon --show)"
      - name: Set Docker default ulimits for Docker 29+ compatibility
        if: inputs.BINARY == 'docker'
        run: |
          for svc in docker containerd; do
            sudo mkdir -p /etc/systemd/system/${svc}.service.d
            printf '[Service]\nLimitNOFILE=1048576\n' | sudo tee /etc/systemd/system/${svc}.service.d/override.conf
          done
          sudo systemctl daemon-reload
          sudo systemctl restart containerd
          sudo systemctl restart docker
      - name: Limit buildkit parallelism to avoid OOM on CI runners
        run: ${{inputs.SUDO}} "$(which earth)" config global.buildkit_max_parallelism 1
      - name: Configure Earthly to use GCR mirror
        run: |-
          ${{inputs.SUDO}} "$(which earth)" config global.buildkit_additional_config "'[registry.\"docker.io\"]
          mirrors = [\"mirror.gcr.io\", \"public.ecr.aws\"]'"
      - name: Earthly bootstrap
        run: ${{inputs.SUDO}} "$(which earth)" bootstrap
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ${{inputs.SUDO}} "${{inputs.BINARY}}" login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Update Buildkit to earthly-next
        if: inputs.USE_NEXT
        run: |-
          set +e
          attempt=1
          max_attempts=2
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::attempt $attempt of $max_attempts"
            ${{inputs.SUDO}} "$(which earth)" +update-buildkit --BUILDKIT_GIT_SHA="$(cat earthly-next)"
            rc=$?
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then exit 0; fi
            if [ "$attempt" -eq "$max_attempts" ]; then exit "$rc"; fi
            echo "Attempt $attempt exited $rc; resetting buildkitd state and retrying once."
            ${{inputs.SUDO}} ${{inputs.BINARY}} rm -fv earthly-buildkitd earthly-dev-buildkitd 2>/dev/null || true
            ${{inputs.SUDO}} ${{inputs.BINARY}} volume rm earthly-cache earthly-dev-cache 2>/dev/null || true
            ${{inputs.SUDO}} rm -rf ~/.earthly/buildkit ~/.earthly-dev/buildkit 2>/dev/null || true
            sleep 3
            ${{inputs.SUDO}} "$(which earth)" bootstrap 2>/dev/null || true
            attempt=$((attempt + 1))
          done
      - name: Build latest earthly using released earthly
        # Non-deterministic earthly "Canceled" failures (different targets
        # each run, no signal received) force a single retry. Downstream
        # jobs all depend on this step, so retrying here avoids cascading
        # skipped jobs.
        run: |-
          set +e
          attempt=1
          max_attempts=2
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::attempt $attempt of $max_attempts"
            ${{inputs.SUDO}} "$(which earth)" --use-inline-cache +for-linux
            rc=$?
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then exit 0; fi
            if [ "$attempt" -eq "$max_attempts" ]; then exit "$rc"; fi
            echo "Attempt $attempt exited $rc; resetting buildkitd state and retrying once."
            ${{inputs.SUDO}} ${{inputs.BINARY}} rm -fv earthly-buildkitd earthly-dev-buildkitd 2>/dev/null || true
            ${{inputs.SUDO}} ${{inputs.BINARY}} volume rm earthly-cache earthly-dev-cache 2>/dev/null || true
            ${{inputs.SUDO}} rm -rf ~/.earthly/buildkit ~/.earthly-dev/buildkit 2>/dev/null || true
            sleep 3
            ${{inputs.SUDO}} "$(which earth)" bootstrap 2>/dev/null || true
            attempt=$((attempt + 1))
          done
      - name: Earthly bootstrap using latest earthly build
        run: ${{inputs.SUDO}} ./build/linux/amd64/earthly bootstrap
      - name: Set EARTHLY_VERSION_FLAG_OVERRIDES env
        run: |-
          set -euo pipefail
          EARTHLY_VERSION_FLAG_OVERRIDES="$(tr -d '\n' < .earthly_version_flag_overrides)"
          echo "EARTHLY_VERSION_FLAG_OVERRIDES=$EARTHLY_VERSION_FLAG_OVERRIDES" >> "$GITHUB_ENV"
      - name: Build and push +ci-release using latest earthly build
        # Same retry rationale as +for-linux above — this was the step that
        # still tripped Canceled in run 24735475094 because the wrapper only
        # covered +for-linux.
        #
        # Between attempts we both drop the buildkitd container AND
        # remove ~/.earthly state: a previous run hit "Error: no active
        # sessions" on attempt 2 because earthly client-side state was
        # still referencing the old (dead) session. Clean reset.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |-
          export TAG_SUFFIX="${{inputs.RUNS_ON}}-${{inputs.BINARY}}"
          if [ "${{inputs.USE_NEXT}}" = "true" ]; then export TAG_SUFFIX="$TAG_SUFFIX-ticktock"; fi
          set +e
          attempt=1
          max_attempts=2
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::attempt $attempt of $max_attempts"
            ${{inputs.SUDO}} ./build/linux/amd64/earthly --ci --push --build-arg TAG_SUFFIX +ci-release
            rc=$?
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then exit 0; fi
            if [ "$attempt" -eq "$max_attempts" ]; then exit "$rc"; fi
            echo "Attempt $attempt exited $rc; resetting buildkitd state and retrying once."
            # The source-built earthly names its buildkit container
            # earthly-dev-buildkitd, not earthly-buildkitd — rm both so the
            # retry doesn't pick up a dead session from the previous run.
            ${{inputs.SUDO}} ${{inputs.BINARY}} rm -fv earthly-buildkitd earthly-dev-buildkitd 2>/dev/null || true
            ${{inputs.SUDO}} ${{inputs.BINARY}} volume rm earthly-cache earthly-dev-cache 2>/dev/null || true
            ${{inputs.SUDO}} rm -rf ~/.earthly/buildkit ~/.earthly-dev/buildkit 2>/dev/null || true
            sleep 3
            ${{inputs.SUDO}} ./build/linux/amd64/earthly bootstrap 2>/dev/null || true
            attempt=$((attempt + 1))
          done
      - name: Build +ci-release using latest earthly build (fork - no push)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |-
          export TAG_SUFFIX="${{inputs.RUNS_ON}}-${{inputs.BINARY}}"
          if [ "${{inputs.USE_NEXT}}" = "true" ]; then export TAG_SUFFIX="$TAG_SUFFIX-ticktock"; fi
          set +e
          attempt=1
          max_attempts=2
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "::group::attempt $attempt of $max_attempts"
            # Build ci-release (builds binary and buildkitd but doesn't push)
            ${{inputs.SUDO}} ./build/linux/amd64/earthly --ci --output --build-arg TAG_SUFFIX +ci-release && \
              ${{inputs.SUDO}} ./build/linux/amd64/earthly --ci --image --build-arg TAG="${GITHUB_SHA}-${TAG_SUFFIX}" --build-arg DOCKERHUB_BUILDKIT_IMG=buildkitd-staging ./buildkitd+buildkitd
            rc=$?
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then exit 0; fi
            if [ "$attempt" -eq "$max_attempts" ]; then exit "$rc"; fi
            echo "Attempt $attempt exited $rc; resetting buildkitd and retrying once."
            # Source-built earthly → earthly-dev-buildkitd container; rm both.
            ${{inputs.SUDO}} ${{inputs.BINARY}} rm -fv earthly-buildkitd earthly-dev-buildkitd 2>/dev/null || true
            ${{inputs.SUDO}} ${{inputs.BINARY}} volume rm earthly-cache earthly-dev-cache 2>/dev/null || true
            ${{inputs.SUDO}} rm -rf ~/.earthly/buildkit ~/.earthly-dev/buildkit 2>/dev/null || true
            sleep 3
            ${{inputs.SUDO}} ./build/linux/amd64/earthly bootstrap 2>/dev/null || true
            attempt=$((attempt + 1))
          done
      - name: Save buildkitd image tarball (all runs)
        # Saving the buildkitd image as a GHA artifact — rather than having
        # every downstream test job re-pull it from ghcr — removes ~40 jobs
        # × ~300 MB of registry traffic per CI run and eliminates the
        # thundering-herd on ghcr that contributed to the Canceled flake.
        # Fork PRs can't push to ghcr anyway, so they already relied on
        # this path; it's just always-on now.
        #
        # Earthly pushes from buildkit's internal store straight to ghcr
        # without tagging the image in the host daemon, so we need an
        # explicit pull first before `save` can find the tag. We pay the
        # pull once here so the ~40 downstream test jobs don't have to.
        # On fork PRs the image is built locally via --image (in the
        # "Build +ci-release ... (fork - no push)" step above) so the
        # pull should be a no-op hit against the local cache.
        run: |-
          set -euo pipefail
          export TAG_SUFFIX="${{inputs.RUNS_ON}}-${{inputs.BINARY}}"
          if [ "${{inputs.USE_NEXT}}" = "true" ]; then export TAG_SUFFIX="$TAG_SUFFIX-ticktock"; fi
          IMG="ghcr.io/earthbuild/earthbuild:buildkitd-staging-${GITHUB_SHA}-${TAG_SUFFIX}"

          mkdir -p ./artifacts
          echo "${TAG_SUFFIX}" > ./artifacts/tag-suffix.txt
          if ! ${{inputs.SUDO}} "${{inputs.BINARY}}" image inspect "$IMG" >/dev/null 2>&1; then
            ${{inputs.SUDO}} "${{inputs.BINARY}}" pull "$IMG"
          fi
          ${{inputs.SUDO}} "${{inputs.BINARY}}" save "$IMG" -o ./artifacts/buildkitd-image.tar
      - name: Build earthly binary artifact (fork only)
        # Fork PRs can't read the earthly binary from ghcr, so ship it in
        # the artifact. Non-fork runs extract it via `earthly upgrade`
        # against ghcr instead — rebuilding here would be ~minutes of
        # redundant work.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |-
          set -euo pipefail
          export TAG_SUFFIX="${{inputs.RUNS_ON}}-${{inputs.BINARY}}"
          if [ "${{inputs.USE_NEXT}}" = "true" ]; then export TAG_SUFFIX="$TAG_SUFFIX-ticktock"; fi

          # DEFAULT_INSTALLATION_NAME=earthly ensures the buildkitd container
          # is named "earthly-buildkitd" as tests expect.
          ${{inputs.SUDO}} ./build/linux/amd64/earthly --ci --artifact \
            +earthly/earthly \
            --DEFAULT_BUILDKITD_IMAGE="ghcr.io/earthbuild/earthbuild:buildkitd-staging-${GITHUB_SHA}-${TAG_SUFFIX}" \
            --VERSION="0.8.18" \
            --DEFAULT_INSTALLATION_NAME=earthly \
            ./artifacts/earthly
      - name: Upload artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: earthly-build-${{inputs.RUNS_ON}}-${{inputs.BINARY}}${{ inputs.USE_NEXT && '-ticktock' || '' }}
          path: ./artifacts/
          retention-days: 1
      - name: Buildkit logs (runs on failure)
        run: |-
          ${{inputs.SUDO}} "${{inputs.BINARY}}" logs earthly-buildkitd || true
          ${{inputs.SUDO}} "${{inputs.BINARY}}" logs earthly-dev-buildkitd || true
        if: ${{ failure() }}
