name: staging release

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - '**-staging-test'
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/renovate.json5'
      - '.github/CODEOWNERS'
      - 'LICENSE'

env:
  OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${{ vars.OTEL_EXPORTER_OTLP_PROTOCOL }}
  OTEL_RESOURCE_ATTRIBUTES: ${{ vars.OTEL_RESOURCE_ATTRIBUTES != '' && format('{0},', vars.OTEL_RESOURCE_ATTRIBUTES) || '' }}${{ github.event.pull_request != null && format('vcs.repository.change.id={0},vcs.repository.change.title={1},', github.event.pull_request.number, github.event.pull_request.title) || '' }}cicd.pipeline.run.id=${{ github.run_number }},cicd.pipeline.run.url.full=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }},cicd.pipeline.name=${{ github.workflow }},vcs.revision.id=${{ github.sha }},vcs.ref.name=${{ github.ref_name }},vcs.repository.name=${{ github.repository }},user.id=${{ github.actor }}
  OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

jobs:
  build-earthly:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-earthly.yml
    with:
      BUILT_EARTHLY_PATH: "./build/linux/amd64/earthly"
      RUNS_ON: "ubuntu-latest"
      BINARY: "docker"
      SUDO: ""
    secrets: inherit
  prepare-release:
    name: prepare release
    needs: build-earthly
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    outputs:
      release_tag: ${{ steps.compute-tag.outputs.release_tag }}
      version: ${{ steps.compute-version.outputs.version }}
      earthly_next: ${{ steps.read-next.outputs.earthly_next }}
    env:
      FORCE_COLOR: 1
      GITHUB_USER: "earthbuild"
      EARTHLY_REPO: "earthbuild-staging"
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_IMG: "earthbuild-staging"
      DOCKERHUB_BUILDKIT_IMG: "buildkitd-staging"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Retrieve earthbuild from build-earthly job
        run: |
          BUILDKITD_IMAGE=docker.io/earthbuild/buildkitd-staging TAG="${GITHUB_SHA}-ubuntu-latest-docker" ./earthly upgrade
          mkdir -p "$(dirname "./build/linux/amd64/earthly")"
          mv "${HOME}/.earthly/earthly-${GITHUB_SHA}-ubuntu-latest-docker" ./build/linux/amd64/earthly
      - name: Compute release tag
        id: compute-tag
        run: |-
          set -euo pipefail
          RELEASE_TAG="$(git rev-parse --short=8 HEAD)"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Compute next version
        id: compute-version
        run: |-
          set -euo pipefail
          short_sha=$(git rev-parse --short=8 HEAD)

          # Get all semver tags, extract base version (strip -rc-*, -dev-*, etc), find highest
          # This handles both clean releases (v0.8.16) and RCs (v0.8.17-rc-1) -> base v0.8.17
          highest_base_version=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | \
            grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | \
            sort -V | tail -1 || echo "")

          if [ -z "$highest_base_version" ]; then
            # No version tags found, start at v0.0.1
            VERSION="v0.0.1-${short_sha}"
          else
            # Check if this exact version has been released (clean tag exists)
            if git tag -l "$highest_base_version" | grep -q "^${highest_base_version}$"; then
              # Clean release exists, increment patch for next version
              version_str="${highest_base_version#v}"
              major="${version_str%%.*}"
              version_str="${version_str#*.}"
              minor="${version_str%%.*}"
              patch="${version_str#*.}"
              next_patch=$((patch + 1))
              VERSION="v${major}.${minor}.${next_patch}-${short_sha}"
            else
              # Only RCs exist for this version, use the base version
              VERSION="${highest_base_version}-${short_sha}"
            fi
          fi

          echo "Computed version: $VERSION (highest base: ${highest_base_version:-none})"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Read earthly-next sha
        id: read-next
        run: |-
          set -euo pipefail
          echo "earthly_next=$(cat earthly-next)" >> "$GITHUB_OUTPUT"

  release-image:
    name: release dockerhub (main)
    needs: [build-earthly, prepare-release]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    env:
      FORCE_COLOR: 1
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_IMG: "earthbuild-staging"
      DOCKERHUB_BUILDKIT_IMG: "buildkitd-staging"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: all
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GITHUB_TOKEN }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Retrieve earthbuild from build-earthly job
        run: |-
          BUILDKITD_IMAGE=docker.io/earthbuild/buildkitd-staging TAG="${GITHUB_SHA}-ubuntu-latest-docker" ./earthly upgrade
          mkdir -p "$(dirname "./build/linux/amd64/earthly")"
          mv "${HOME}/.earthly/earthly-${GITHUB_SHA}-ubuntu-latest-docker" ./build/linux/amd64/earthly
      - name: Release to DockerHub (main)
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |-
          set -euo pipefail
          ./build/linux/amd64/earthly --push \
            ./release+release-dockerhub \
            --DOCKERHUB_USER="${{ env.DOCKERHUB_USER }}" \
            --DOCKERHUB_IMG="${{ env.DOCKERHUB_IMG }}" \
            --DOCKERHUB_BUILDKIT_IMG="${{ env.DOCKERHUB_BUILDKIT_IMG }}" \
            --PUSH_PRERELEASE_TAG="true" \
            --PUSH_LATEST_TAG="false" \
            --RELEASE_TAG="${{ env.RELEASE_TAG }}" \
            --VERSION="${{ env.VERSION }}"

  release-ticktock-image:
    name: release dockerhub (ticktock)
    needs: [build-earthly, prepare-release]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    env:
      FORCE_COLOR: 1
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_IMG: "earthbuild-staging"
      DOCKERHUB_BUILDKIT_IMG: "buildkitd-staging"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: all
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GITHUB_TOKEN }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Retrieve earthbuild from build-earthly job
        run: |-
          BUILDKITD_IMAGE=docker.io/earthbuild/buildkitd-staging TAG="${GITHUB_SHA}-ubuntu-latest-docker" ./earthly upgrade
          mkdir -p "$(dirname "./build/linux/amd64/earthly")"
          mv "${HOME}/.earthly/earthly-${GITHUB_SHA}-ubuntu-latest-docker" ./build/linux/amd64/earthly
      - name: Release to DockerHub (ticktock)
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          EARTHLY_NEXT: ${{ needs.prepare-release.outputs.earthly_next }}
        run: |-
          set -euo pipefail
          ./build/linux/amd64/earthly --push \
            ./release+release-dockerhub \
            --DOCKERHUB_USER="${{ env.DOCKERHUB_USER }}" \
            --DOCKERHUB_IMG="${{ env.DOCKERHUB_IMG }}" \
            --DOCKERHUB_BUILDKIT_IMG="${{ env.DOCKERHUB_BUILDKIT_IMG }}" \
            --PUSH_PRERELEASE_TAG="false" \
            --PUSH_LATEST_TAG="false" \
            --RELEASE_TAG="${{ env.RELEASE_TAG }}-ticktock" \
            --BUILDKIT_PROJECT=github.com/earthbuild/buildkit:${{ env.EARTHLY_NEXT }}

  copy-buildkitd-to-dockerhub:
    name: copy buildkitd to dockerhub
    needs: [build-earthly, prepare-release, release-image]
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    env:
      FORCE_COLOR: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Retrieve earthbuild from build-earthly job
        run: |-
          BUILDKITD_IMAGE=docker.io/earthbuild/buildkitd-staging TAG="${GITHUB_SHA}-ubuntu-latest-docker" ./earthly upgrade
          mkdir -p "$(dirname "./build/linux/amd64/earthly")"
          mv "${HOME}/.earthly/earthly-${GITHUB_SHA}-ubuntu-latest-docker" ./build/linux/amd64/earthly
      - name: Copy buildkitd from GHCR to DockerHub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |-
          set -euo pipefail
          ./build/linux/amd64/earthly --push \
            --secret CONTAINER_REGISTRY_TOKEN=${{ env.GITHUB_TOKEN }} \
            --secret DEST_CONTAINER_REGISTRY_TOKEN=${{ env.DOCKERHUB_TOKEN }} \
            ./release+copy-staging-buildkitd-to-dockerhub \
            --RELEASE_TAG="${{ env.RELEASE_TAG }}" \
            --CONTAINER_REGISTRY_USER="${{ github.actor }}" \
            --DST_CONTAINER_REGISTRY_USER="${{ vars.DOCKERHUB_USERNAME }}" \
            --DST_REPOSITORY_USER="earthbuild" \
            --DST_DOCKERHUB_BUILDKIT_IMG="buildkitd" \
            --DEST_TAG="${{ env.VERSION }}"

  release-binaries:
    name: release github
    needs: [build-earthly, prepare-release, copy-buildkitd-to-dockerhub]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      FORCE_COLOR: 1
      GITHUB_USER: "earthbuild"
      EARTHLY_REPO: "earthbuild-staging"
      DOCKERHUB_USER: "earthbuild"
      DOCKERHUB_BUILDKIT_IMG: "buildkitd"
    steps:
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: all
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Retrieve earthbuild from build-earthly job
        run: |-
          BUILDKITD_IMAGE=docker.io/earthbuild/buildkitd-staging TAG="${GITHUB_SHA}-ubuntu-latest-docker" ./earthly upgrade
          mkdir -p "$(dirname "./build/linux/amd64/earthly")"
          mv "${HOME}/.earthly/earthly-${GITHUB_SHA}-ubuntu-latest-docker" ./build/linux/amd64/earthly
      # This step creates earthly binaries for all platforms plus signature files for them under
      # the ./release/release/ dir
      - name: Create Release Binaries
        env:
          GPG_PRIVATE: ${{ secrets.GPG_PRIVATE }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |-
          set -euo pipefail
          ./build/linux/amd64/earthly --push \
            --secret GPG_PRIVATE="${{ env.GPG_PRIVATE }}" \
            ./release+signed-release \
            --DOCKERHUB_HOST="docker.io" \
            --GITHUB_USER="${{ env.GITHUB_USER }}" \
            --EARTHLY_REPO="${{ env.EARTHLY_REPO }}" \
            --DOCKERHUB_USER="${{ env.DOCKERHUB_USER }}" \
            --DOCKERHUB_BUILDKIT_IMG="${{ env.DOCKERHUB_BUILDKIT_IMG }}" \
            --RELEASE_TAG="${{ env.RELEASE_TAG }}" \
            --VERSION="${{ env.VERSION }}" \
            --PRERELEASE=false
      # Upload before the smoke test so the built binaries are always available
      # for download/debugging, even when the smoke test below fails.
      - name: Upload Release Binaries Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ needs.prepare-release.outputs.release_tag }}
          path: release/release/**

      - name: Smoke test binary default buildkit image
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |-
          set -euo pipefail
          BINARY="./release/release/earth-linux-amd64"
          EXPECTED_IMAGE="docker.io/earthbuild/buildkitd:${VERSION}"

          echo "Smoke testing ${BINARY} (expected default buildkit image: ${EXPECTED_IMAGE})"
          "${BINARY}" --version || true

          HELP_OUTPUT="$("${BINARY}" --help 2>&1 || true)"

          # Match on the flag name only. The help placeholder token varies by
          # urfave/cli version ("--buildkit-image string" on v3, "value" on v2),
          # so grepping for a specific placeholder is brittle.
          ACTUAL_LINE="$(printf '%s\n' "${HELP_OUTPUT}" | grep -- '--buildkit-image' || true)"

          if [ -z "${ACTUAL_LINE}" ]; then
            echo "::error::Could not find the --buildkit-image flag in --help output."
            echo "Full --help output follows for debugging:"
            printf '%s\n' "${HELP_OUTPUT}"
            exit 1
          fi

          echo "Found flag line:${ACTUAL_LINE}"

          if [[ "${ACTUAL_LINE}" != *"(default: \"${EXPECTED_IMAGE}\")"* ]]; then
            echo "::error::Default buildkit image is incorrect."
            echo "  Expected default: ${EXPECTED_IMAGE}"
            echo "  Actual flag line:${ACTUAL_LINE}"
            exit 1
          fi

          echo "Smoke test passed: default buildkit image is ${EXPECTED_IMAGE}"
